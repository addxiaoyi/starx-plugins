name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check code style
        run: ./gradlew spotlessCheck --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Build shadow JARs
        run: ./gradlew :starx-velocity:shadowJar :starx-paper:shadowJar --no-daemon

      - name: Upload Velocity JAR
        uses: actions/upload-artifact@v4
        with:
          name: starx-velocity
          path: starx-velocity/build/libs/starx-velocity-*-all.jar

      - name: Upload Paper JAR
        uses: actions/upload-artifact@v4
        with:
          name: starx-paper
          path: starx-paper/build/libs/starx-paper-*-all.jar

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: '**/build/test-results*/**/TEST-*.xml'
          reporter: java-junit