name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21]

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: always

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Check code style
        run: ./gradlew spotlessJavaCheck --no-daemon

      - name: Build and test
        run: ./gradlew build -Pversion=${{ steps.version.outputs.VERSION }} --no-daemon

      - name: Upload Velocity JAR
        uses: actions/upload-artifact@v4
        with:
          name: starx-velocity
          path: starx-velocity/build/libs/starx-velocity-*-all.jar

      - name: Upload Paper JAR
        uses: actions/upload-artifact@v4
        with:
          name: starx-paper
          path: starx-paper/build/libs/starx-paper-*-all.jar

      - name: Test Summary
        if: always()
        run: |
          echo '## Test Results' >> $GITHUB_STEP_SUMMARY
          find . -path '*/build/test-results*/**/TEST-*.xml' -exec sh -c 'grep -oP "tests=\"\K[^\"]+" "$1" | head -1' _ {} \; | while read -r line; do
            echo "- $line tests" >> $GITHUB_STEP_SUMMARY
          done || echo 'No test results found' >> $GITHUB_STEP_SUMMARY

  release:
    name: Create Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Velocity JAR
        uses: actions/download-artifact@v4
        with:
          name: starx-velocity
          path: artifacts/

      - name: Download Paper JAR
        uses: actions/download-artifact@v4
        with:
          name: starx-paper
          path: artifacts/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true