name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21]

    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: always

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Check code style
        run: ./gradlew spotlessJavaCheck --no-daemon

      - name: Build and run tests
        run: ./gradlew build -Pversion=${{ steps.version.outputs.VERSION }} --no-daemon

      - name: Generate coverage report
        if: always()
        run: ./gradlew jacocoTestReport --no-daemon || true

      - name: Upload Velocity JAR
        uses: actions/upload-artifact@v7
        with:
          name: starx-velocity
          path: starx-velocity/build/libs/starx-velocity-${{ steps.version.outputs.VERSION }}.jar

      - name: Upload Paper JAR
        uses: actions/upload-artifact@v7
        with:
          name: starx-paper
          path: starx-paper/build/libs/starx-paper-${{ steps.version.outputs.VERSION }}.jar

      - name: Build patched LimboAPI JAR
        run: ./gradlew :limboapi-plugins:buildPatchedLimboAPI --no-daemon

      - name: Upload Patched LimboAPI JAR
        uses: actions/upload-artifact@v7
        with:
          name: limboapi-patched
          path: limboapi-plugins/build/libs/limboapi-1.1.27-SNAPSHOT-velocity-3.5-patched.jar

      - name: Test Summary
        if: always()
        run: |
          echo '## Test Results' >> $GITHUB_STEP_SUMMARY
          find . -path '*/build/test-results/test/*.xml' -exec grep -l 'testsuite' {} \; | while read -r f; do
            name=$(basename "$f" .xml | sed 's/.*\.//')
            total=$(grep -oP 'tests="\K[^"]+' "$f")
            fail=$(grep -oP 'failures="\K[^"]+' "$f")
            echo "- **$name**: $total tests, $fail failures" >> $GITHUB_STEP_SUMMARY
          done || echo 'No test results found' >> $GITHUB_STEP_SUMMARY

  release:
    name: Create Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Velocity JAR
        uses: actions/download-artifact@v8
        with:
          name: starx-velocity
          path: artifacts/

      - name: Download Paper JAR
        uses: actions/download-artifact@v8
        with:
          name: starx-paper
          path: artifacts/

      - name: Download Patched LimboAPI JAR
        uses: actions/download-artifact@v8
        with:
          name: limboapi-patched
          path: artifacts/

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
